<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Single Login & Ambil Token</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; }
    .container { width: min(900px, calc(100vw - 32px)); margin: 0 auto; padding: 20px 16px 40px; }

    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .title h1 { margin: 0; font-size: 28px; }
    .title p { margin: 6px 0 0; color: #64748b; font-size: 14px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn { border: none; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; text-decoration: none; display: inline-block; text-align: center; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(15,23,42,.25); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-sm { width: auto; padding: 10px 12px; font-size: 13px; }
    .btn-secondary { background: #e2e8f0; color: #0f172a; }
    .btn-danger { background: #dc2626; }
    .btn-copy { background: #1d4ed8; color: #fff; width: 100%; margin-top: 6px; }
    .btn-copy:hover:not(:disabled) { background: #2563eb; }

    .section { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 18px rgba(15,23,42,.06); margin-bottom: 18px; }
    .section h2 { margin: 0 0 16px; font-size: 18px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media(max-width:560px){ .row { grid-template-columns: 1fr; } }

    .field { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    input, textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 9px 12px; font-size: 14px; color: #0f172a; background: #f8fafc; outline: none; transition: border-color .2s; }
    input:focus, textarea:focus { border-color: #0f172a; }
    textarea { resize: vertical; font-family: 'Courier New', monospace; font-size: 12px; }

    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    @media(max-width:560px){ .result-grid { grid-template-columns: 1fr; } }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-fail { background: #fee2e2; color: #991b1b; }

    .alert { border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-top: 12px; display: none; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .is-busy { opacity: 0.7; pointer-events: none; }
    .toast { position: fixed; top: 16px; right: 16px; z-index: 9999; min-width: 260px; max-width: min(420px, calc(100vw - 32px)); border-radius: 14px; padding: 12px 14px; font-size: 14px; line-height: 1.45; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18); display: none; }
    .toast.show { display: block; }
    .toast-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .toast-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="toast toast-success" id="globalToast"></div>
<div class="container">

  <div class="topbar">
    <div class="title">
      <h1>Single Login &amp; Ambil Token</h1>
      <p>Login ke akun dan ambil JWT token secara langsung.</p>
    </div>
    <div class="actions">
      <a class="btn btn-sm btn-secondary" href="/admin">← Admin Dashboard</a>
      <a class="btn btn-sm btn-danger" href="/admin/logout">Logout Admin</a>
    </div>
  </div>

  <div class="section">
    <h2>Form Login</h2>
    <div class="row">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="email / username" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="type_of_web">Type of Web</label>
        <input id="type_of_web" type="text" value="spgCMKT"/>
      </div>
      <div class="field">
        <label for="recaptcha_token">reCAPTCHA Token</label>
        <input id="recaptcha_token" type="text" placeholder="token recaptcha"/>
      </div>
    </div>
    <button class="btn" id="btn-login" style="width:100%;margin-top:4px;" onclick="doLogin()">Login &amp; Ambil Token</button>
    <div class="alert alert-error" id="error-box"></div>
  </div>

  <div class="section">
    <h2>Hasil</h2>
    <div class="field">
      <label>Token</label>
      <textarea id="token" rows="4" readonly placeholder="Token akan muncul di sini..."></textarea>
      <button class="btn btn-copy" id="btn-copy" onclick="copyToken()" disabled>Copy Token</button>
    </div>
    <div class="result-grid">
      <div class="field">
        <label>Status Code</label>
        <div id="status-badge" style="margin-top:4px;min-height:24px;"></div>
      </div>
      <div class="field">
        <label>Token Source</label>
        <input id="token_source" type="text" readonly/>
      </div>
      <div class="field">
        <label>Timestamp</label>
        <input id="timestamp" type="text" readonly/>
      </div>
      <div class="field">
        <label>Hash</label>
        <input id="hash" type="text" readonly/>
      </div>
    </div>
    <div class="field">
      <label>Response Preview</label>
      <textarea id="preview" rows="5" readonly placeholder="Response JSON..."></textarea>
    </div>
  </div>

</div>

<script>
const globalToast = document.getElementById('globalToast');
let toastTimer = null;

function showToast(message, type = 'success') {
  if (!message) {
    globalToast.classList.remove('show');
    globalToast.textContent = '';
    return;
  }
  if (toastTimer) clearTimeout(toastTimer);
  globalToast.className = 'toast ' + (type === 'error' ? 'toast-error' : 'toast-success');
  globalToast.textContent = message;
  globalToast.classList.add('show');
  toastTimer = setTimeout(() => globalToast.classList.remove('show'), 2800);
}

async function doLogin() {
  const btn = document.getElementById('btn-login');
  const section = btn.closest('.section');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const type_of_web = document.getElementById('type_of_web').value.trim() || 'spgCMKT';
  const recaptcha_token = document.getElementById('recaptcha_token').value.trim();

  clearResults();
  if (!username) { showError('Username tidak boleh kosong.'); return; }
  if (!password) { showError('Password tidak boleh kosong.'); return; }
  if (!recaptcha_token) { showError('reCAPTCHA token tidak boleh kosong.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Memproses...';
  if (section) section.classList.add('is-busy');

  try {
    const res = await fetch('/admin/single-login/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, type_of_web, recaptcha_token })
    });
    const data = await res.json();

    document.getElementById('token').value = data.token || '';
    document.getElementById('token_source').value = data.token_source || '';
    document.getElementById('timestamp').value = data.timestamp || '';
    document.getElementById('hash').value = data.hash || '';
    document.getElementById('preview').value = data.response_preview || '';

    const badgeEl = document.getElementById('status-badge');
    badgeEl.innerHTML = data.status_code
      ? `<span class="badge ${data.success ? 'badge-ok' : 'badge-fail'}">${data.status_code}</span>`
      : '';

    if (data.token) document.getElementById('btn-copy').disabled = false;
    if (!data.success) showError(data.error || 'Login gagal.');
    else showToast('Token berhasil diambil.', 'success');
  } catch (e) {
    showError('Gagal menghubungi server: ' + e.message);
  } finally {
    if (section) section.classList.remove('is-busy');
    btn.disabled = false;
    btn.innerHTML = 'Login &amp; Ambil Token';
  }
}

function copyToken() {
  const t = document.getElementById('token').value;
  if (!t) return;
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'Tersalin!';
    setTimeout(() => { btn.textContent = 'Copy Token'; }, 1800);
  });
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
  showToast(msg, 'error');
}

function clearResults() {
  ['token','token_source','timestamp','hash','preview'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('status-badge').innerHTML = '';
  document.getElementById('btn-copy').disabled = true;
  document.getElementById('error-box').style.display = 'none';
}
</script>
</body>
</html>
