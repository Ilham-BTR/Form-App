<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Survey Customer</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .hero {
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: white;
      padding: 24px 18px 36px;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.18);
    }

    .hero h1 { margin: 0; font-size: 24px; }
    .hero p { margin: 10px 0 0; font-size: 14px; }

    .top-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
    }

    .logout-btn {
      background: rgba(255,255,255,0.15);
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
    }

    .form-wrap {
      padding: 16px;
      margin-top: -16px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: bold;
    }

    .input, .select, .file {
      width: 100%;
      border: none;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      border: none;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color: white;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .quota-box {
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="hero">
    <h1>Form Survey Customer</h1>
    <p>Isi data di bawah ini lalu kirim</p>

    <div class="top-actions">
      <!-- ✅ Admin Page sudah dihapus -->
      <a href="/logout" class="logout-btn">Ganti Token</a>
    </div>
  </div>

  <div class="form-wrap">

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if success_message %}
      <div class="success">{{ success_message }}</div>
    {% endif %}

    {% if remaining_today is not none %}
      <div class="quota-box">
        Sisa kuota hari ini: {{ remaining_today }}
      </div>
    {% endif %}

    <form method="post" enctype="multipart/form-data">

      <div class="card">

        <div class="field">
          <label>Nomor HP</label>
          <input class="input" name="phone_number" value="{{ assigned_phone_number }}" readonly>
        </div>

        <div class="field">
          <label>Nama Customer</label>
          <input class="input" name="customer_name" required>
        </div>

        <div class="field">
          <label>Age Range</label>
          <select class="select" name="age_range" required>
            {% for value,label in age_range_options %}
              <option value="{{value}}">{{label}}</option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label>BUMO</label>
          <select class="select" name="current_bumo" required></select>
        </div>

        <div class="field">
          <label>KC Area</label>
          <select class="select" name="kc_area" required></select>
        </div>

        <div class="field">
          <label>Paket</label>
          <select class="select" name="sp12_pack">
            <option>1 pack</option>
            <option>2 pack</option>
          </select>
        </div>

        <div class="field">
          <label>Foto Transaksi</label>
          <input class="file" type="file" name="transaction_photo" required>
        </div>

        <div class="field">
          <label>Screenshot Chat</label>
          <input class="file" type="file" name="chat_photo" required>
        </div>

      </div>

      <button class="btn">Submit</button>

    </form>

  </div>

</div>

</body>
</html>
