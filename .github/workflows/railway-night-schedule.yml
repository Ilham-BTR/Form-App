name: Railway Night Schedule

on:
  workflow_dispatch:
    inputs:
      action:
        description: stop atau start Railway service
        required: true
        type: choice
        options:
          - stop
          - start
  schedule:
    # 01:00 WIB = 18:00 UTC
    - cron: "0 18 * * *"
    # 07:00 WIB = 00:00 UTC
    - cron: "0 0 * * *"

jobs:
  railway-night-schedule:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Decide action
        id: decide
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.action }}" ]; then
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 18 * * *" ]; then
            echo "action=stop" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            echo "action=start" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown schedule: ${{ github.event.schedule }}" >&2
            exit 1
          fi

      - name: Check Railway secrets
        shell: bash
        run: |
          missing=0
          for name in RAILWAY_TOKEN RAILWAY_SERVICE_ID RAILWAY_ENVIRONMENT_ID; do
            if [ -z "${!name}" ]; then
              echo "::warning::$name belum diset di GitHub Secrets"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Railway schedule skipped because secrets are missing."
            exit 0
          fi

      - name: Run Railway schedule
        if: env.RAILWAY_TOKEN != '' && env.RAILWAY_SERVICE_ID != '' && env.RAILWAY_ENVIRONMENT_ID != ''
        run: python scripts/railway_schedule.py --action "${{ steps.decide.outputs.action }}"
